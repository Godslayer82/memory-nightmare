<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memory Nightmare</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

h1{
    color:red;
}

#gameCanvas{
    border:3px solid white;
    margin-top:10px;
    background:black;
}

#info{
    margin-top:10px;
    font-size:20px;
}
</style>
</head>
<body>

<h1>🧠 Memory Nightmare</h1>
<p>Memorize the maze before it disappears!</p>

<div id="info">Level 1</div>
<canvas id="gameCanvas" width="600" height="600"></canvas>

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const tileSize = 30;

let level = 1;
let maze = [];
let player = {x:1,y:1};
let exit = {x:0,y:0};
let memorizing = true;

function createMaze(size){

    maze = [];

    for(let y=0;y<size;y++){
        maze[y] = [];

        for(let x=0;x<size;x++){

            if(
                x===0 ||
                y===0 ||
                x===size-1 ||
                y===size-1
            ){
                maze[y][x]=1;
            }else{
                maze[y][x]=Math.random()<0.30 ? 1 : 0;
            }
        }
    }

    player = {x:1,y:1};

    maze[1][1]=0;

    exit={
        x:size-2,
        y:size-2
    };

    maze[exit.y][exit.x]=0;

    makePath();
}

function makePath(){

    let x=1;
    let y=1;

    while(x<exit.x){
        x++;
        maze[y][x]=0;
    }

    while(y<exit.y){
        y++;
        maze[y][x]=0;
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const size = maze.length;

    if(memorizing){

        for(let y=0;y<size;y++){
            for(let x=0;x<size;x++){

                if(maze[y][x]===1){
                    ctx.fillStyle="gray";
                }else{
                    ctx.fillStyle="#111";
                }

                ctx.fillRect(
                    x*tileSize,
                    y*tileSize,
                    tileSize,
                    tileSize
                );
            }
        }

        ctx.fillStyle="lime";
        ctx.fillRect(
            player.x*tileSize,
            player.y*tileSize,
            tileSize,
            tileSize
        );

        ctx.fillStyle="gold";
        ctx.fillRect(
            exit.x*tileSize,
            exit.y*tileSize,
            tileSize,
            tileSize
        );

    }else{

        ctx.fillStyle="black";
        ctx.fillRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

    }
}

function nextLevel(){

    document.getElementById("info").textContent =
        "Level " + level + " - Memorize!";

    const size = Math.min(8 + level*2, 20);

    createMaze(size);

    memorizing = true;

    draw();

    setTimeout(()=>{

        memorizing = false;

        document.getElementById("info").textContent =
            "Maze Hidden! Use memory!";

        draw();

    },5000);
}

function move(dx,dy){

    let nx = player.x + dx;
    let ny = player.y + dy;

    if(
        nx < 0 ||
        ny < 0 ||
        nx >= maze.length ||
        ny >= maze.length
    ){
        return;
    }

    if(maze[ny][nx]===1){
        return;
    }

    player.x = nx;
    player.y = ny;

    if(
        player.x===exit.x &&
        player.y===exit.y
    ){

        level++;

        document.getElementById("info").textContent =
            "Level Complete!";

        setTimeout(nextLevel,1500);
    }
}

document.addEventListener("keydown",(e)=>{

    switch(e.key.toLowerCase()){

        case "arrowup":
        case "w":
            move(0,-1);
            break;

        case "arrowdown":
        case "s":
            move(0,1);
            break;

        case "arrowleft":
        case "a":
            move(-1,0);
            break;

        case "arrowright":
        case "d":
            move(1,0);
            break;
    }
});

nextLevel();

</script>

</body>
</html>
